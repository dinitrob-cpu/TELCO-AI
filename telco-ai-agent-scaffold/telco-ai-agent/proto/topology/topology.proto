syntax = "proto3";

package telco.topology.v1;

option go_package = "github.com/telco-ai-agent/proto/topology;topologyv1";

import "google/protobuf/timestamp.proto";

// TopologyService exposes the live network graph maintained by the
// Topology SubAgent.
service TopologyService {
  rpc GetGraph(GetGraphRequest) returns (Graph);
  rpc GetGraphAtTime(GetGraphAtTimeRequest) returns (Graph);
  rpc GetNodeNeighborhood(NodeNeighborhoodRequest) returns (Graph);
  rpc SubscribeDeltas(SubscribeDeltasRequest) returns (stream GraphDelta);
}

message GetGraphRequest {}

message GetGraphAtTimeRequest {
  google.protobuf.Timestamp at = 1;
}

message NodeNeighborhoodRequest {
  string node_id = 1;
  int32 hops = 2;
}

message SubscribeDeltasRequest {
  // optional: filter to a subset of node ids; empty = all
  repeated string node_ids = 1;
}

enum NodeType {
  NODE_TYPE_UNSPECIFIED = 0;
  NODE_TYPE_ROUTER = 1;
  NODE_TYPE_OLT = 2;
  NODE_TYPE_ONT = 3;
  NODE_TYPE_CELL_SITE = 4;
  NODE_TYPE_QKD_NODE = 5;
}

enum EdgeType {
  EDGE_TYPE_UNSPECIFIED = 0;
  EDGE_TYPE_FIBER = 1;
  EDGE_TYPE_MICROWAVE = 2;
  EDGE_TYPE_QKD_CHANNEL = 3;
  EDGE_TYPE_LOGICAL = 4;
}

message Node {
  string id = 1;
  NodeType type = 2;
  map<string, string> attrs = 3;
}

message Edge {
  string id = 1;
  string src_node_id = 2;
  string dst_node_id = 3;
  EdgeType type = 4;
  double bandwidth_mbps = 5;
  double latency_ms = 6;
  map<string, string> attrs = 7;
}

message Graph {
  int64 version = 1;
  google.protobuf.Timestamp taken_at = 2;
  repeated Node nodes = 3;
  repeated Edge edges = 4;
}

message GraphDelta {
  int64 version = 1;
  google.protobuf.Timestamp taken_at = 2;
  repeated Node added_nodes = 3;
  repeated Node updated_nodes = 4;
  repeated string removed_node_ids = 5;
  repeated Edge added_edges = 6;
  repeated Edge updated_edges = 7;
  repeated string removed_edge_ids = 8;
}
